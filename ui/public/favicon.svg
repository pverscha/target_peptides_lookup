<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: deep blue rounded square -->
  <rect width="32" height="32" rx="7" fill="#1565C0"/>

  <!-- Outer target ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="white" stroke-width="1.5" opacity="0.45"/>

  <!-- Crosshair tick marks (4 directions) -->
  <line x1="16" y1="3.5" x2="16" y2="7.5"   stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="24.5" x2="16" y2="28.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="3.5"  y1="16" x2="7.5"  y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="24.5" y1="16" x2="28.5" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Inner ring (second bullseye ring) -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Peptide chain: three amino-acid beads connected by a backbone line at a diagonal through the target centre -->
  <line x1="9" y1="20" x2="23" y2="12" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="9"  cy="20" r="2.5" fill="white"/>
  <circle cx="16" cy="16" r="3"   fill="white"/>
  <circle cx="23" cy="12" r="2.5" fill="white"/>
</svg>
